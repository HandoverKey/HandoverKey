openapi: 3.1.0
info:
  title: HandoverKey API
  description: >
    REST API for the HandoverKey digital legacy platform. All protected
    endpoints require a valid JWT access token sent as a Bearer header or
    httpOnly cookie.
  version: 2.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  contact:
    name: HandoverKey
    url: https://handoverkey.com

servers:
  - url: /api/v1
    description: Default (relative)
  - url: http://localhost:3001/api/v1
    description: Local development

tags:
  - name: Auth
    description: Registration, login, 2FA, password management
  - name: Vault
    description: Encrypted vault entry CRUD
  - name: Successors
    description: Manage trusted successors
  - name: Activity
    description: Activity logs and check-ins
  - name: Inactivity
    description: Dead man's switch / inactivity settings
  - name: Sessions
    description: Session management
  - name: Admin
    description: Admin dashboard (requires ADMIN_EMAILS)
  - name: Contact
    description: Contact form

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken

  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
            code:
              type: string

    VaultEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        encryptedData:
          type: string
          description: Base64-encoded AES-256-GCM ciphertext
        iv:
          type: string
          description: Base64-encoded initialisation vector
        salt:
          type: string
          description: Base64-encoded salt
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Successor:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        verified:
          type: boolean
        createdAt:
          type: string
          format: date-time

security:
  - bearerAuth: []
  - cookieAuth: []

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, confirmPassword]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                confirmPassword:
                  type: string
                salt:
                  type: string
                  description: Client-generated encryption salt (base64)
      responses:
        "201":
          description: User registered -- verification email sent
        "409":
          description: Email already registered

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                twoFactorCode:
                  type: string
                recoveryCode:
                  type: string
      responses:
        "200":
          description: Login successful (sets httpOnly cookies)
        "401":
          description: Invalid credentials or 2FA required

  /auth/logout:
    post:
      tags: [Auth]
      summary: Log out and invalidate session
      responses:
        "200":
          description: Logged out

  /auth/profile:
    get:
      tags: [Auth]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
        "401":
          description: Not authenticated

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      responses:
        "200":
          description: New tokens issued

  /auth/verify-email:
    get:
      tags: [Auth]
      summary: Verify email address
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Email verified

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Reset email sent (always 200 to prevent enumeration)

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with token
      security: []
      responses:
        "200":
          description: Password reset

  /vault/entries:
    get:
      tags: [Vault]
      summary: List vault entries
      responses:
        "200":
          description: Array of vault entries
    post:
      tags: [Vault]
      summary: Create a vault entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, encryptedData, iv, salt]
              properties:
                title:
                  type: string
                encryptedData:
                  type: string
                iv:
                  type: string
                salt:
                  type: string
                category:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
      responses:
        "201":
          description: Entry created

  /vault/entries/{id}:
    get:
      tags: [Vault]
      summary: Get a vault entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Vault entry
        "404":
          description: Not found
    put:
      tags: [Vault]
      summary: Update a vault entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Entry updated
    delete:
      tags: [Vault]
      summary: Delete a vault entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Entry deleted

  /successors:
    get:
      tags: [Successors]
      summary: List successors
      responses:
        "200":
          description: Array of successors
    post:
      tags: [Successors]
      summary: Add a successor
      responses:
        "201":
          description: Successor added

  /successors/{id}:
    put:
      tags: [Successors]
      summary: Update a successor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Successor updated
    delete:
      tags: [Successors]
      summary: Remove a successor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Successor removed

  /activity:
    get:
      tags: [Activity]
      summary: Get activity logs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated activity logs

  /activity/check-in:
    post:
      tags: [Activity]
      summary: Manual check-in (resets inactivity timer)
      responses:
        "200":
          description: Check-in recorded

  /inactivity/settings:
    get:
      tags: [Inactivity]
      summary: Get inactivity settings
      responses:
        "200":
          description: Current inactivity settings
    put:
      tags: [Inactivity]
      summary: Update inactivity settings
      responses:
        "200":
          description: Settings updated

  /sessions:
    get:
      tags: [Sessions]
      summary: List active sessions
      responses:
        "200":
          description: Array of sessions

  /sessions/{id}:
    delete:
      tags: [Sessions]
      summary: Invalidate a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Session invalidated

  /admin/dashboard:
    get:
      tags: [Admin]
      summary: Get admin dashboard stats
      responses:
        "200":
          description: Dashboard data
        "403":
          description: Not an admin

  /contact:
    post:
      tags: [Contact]
      summary: Submit contact form
      security: []
      responses:
        "200":
          description: Message sent
